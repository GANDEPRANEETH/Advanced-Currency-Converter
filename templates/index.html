<!DOCTYPE html>
<html>
<head>
    <title>Advanced Currency Converter</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<div class="container">
    <div class="card shadow p-4 mt-5">
        <h2 class="text-center mb-4">💰 Advanced Currency Converter</h2>

        <form method="POST">
            <div class="mb-3">
                <input type="number" step="any" name="amount" class="form-control"
                       placeholder="Enter Amount" required>
            </div>

            <div class="row">
                <div class="col">
                    <select name="from_currency" class="form-control" required>
                        <option value="">Select From Currency</option>
                        {% for currency in currencies %}
                            <option value="{{ currency }}">{{ currency }}</option>
                        {% endfor %}
                    </select>
                </div>

                <div class="col">
                    <select name="to_currency" class="form-control" required>
                        <option value="">Select To Currency</option>
                        {% for currency in currencies %}
                            <option value="{{ currency }}">{{ currency }}</option>
                        {% endfor %}
                    </select>
                </div>
            </div>

            <button type="submit" class="btn btn-primary w-100 mt-3">
                Convert
            </button>
        </form>

        {% if result %}
            <div class="alert alert-success mt-4 text-center">
                <h4>Converted Amount: {{ result }}</h4>
                <p>Exchange Rate Used: {{ rate }}</p>
            </div>
        {% endif %}

        {% if error %}
            <div class="alert alert-danger mt-4 text-center">
                {{ error }}
            </div>
        {% endif %}

        <div class="text-center mt-3">
            <a href="/history" class="btn btn-secondary">View Conversion History</a>
        </div>
    </div>
</div>

</body>
</html>
